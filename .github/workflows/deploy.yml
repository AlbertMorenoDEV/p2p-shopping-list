name: Deploy Shared Shopping List

on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for AWS OIDC
  contents: write # Required for GitHub Pages deploy

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-1' }}
  DOMAIN_NAME: ${{ secrets.DOMAIN_NAME || 'list.albertmoreno.dev' }}

jobs:
  terraform:
    name: Infrastructure (Terraform)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="hosted_zone_id=${{ secrets.HOSTED_ZONE_ID }}" \
            -var="domain_name=${{ env.DOMAIN_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}"
        working-directory: terraform

  deploy:
    name: Build & Publish (GitHub Pages)
    needs: terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Add CNAME for Custom Domain
        run: echo "${{ env.DOMAIN_NAME }}" > ./dist/CNAME

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
